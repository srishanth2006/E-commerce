version: "3.9"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sri_provision_store
      MYSQL_USER: sri_user
      MYSQL_PASSWORD: sri_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: sri_user
      DB_PASSWORD: sri_password
      DB_NAME: sri_provision_store
      SECRET_KEY: dev_secret_change_me
      FRONTEND_ORIGIN: http://localhost:5173
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mysql_data:
